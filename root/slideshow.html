<!doctype html><html><head><meta charset="utf-8"><title>Slideshow root</title><style>html,body{margin:0;height:100%;background:#000;color:#fff}#view{display:flex;align-items:center;justify-content:center;height:100%}img{max-width:100%;max-height:100%}#title{position:fixed;top:10px;left:10px;font-family:sans-serif;opacity:.5}</style></head><body><div id="title">Défaut</div><div id="view"><img id="img"/></div><script>async function run(){const res=await fetch('./latest.json');const data=await res.json();const items=data.items;let i=0;const img=document.getElementById('img');async function step(){if(items.length===0){setTimeout(step,5000);return;}const it=items[i%items.length];img.src=it.src;setTimeout(step,(it.duration||5)*1000);i++;}step();}run();</script></body></html>
