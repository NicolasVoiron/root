<!doctype html><html lang="fr"><head><meta charset="utf-8"/><meta name="viewport" content="width=device-width, initial-scale=1"/><title>Carrousel KPIs – Slideshow</title><style>html,body{height:100%}body{margin:0;background:#000;display:flex;align-items:center;justify-content:center}img{max-width:100vw;max-height:100vh;object-fit:contain;background:#000}.overlay{position:fixed;top:0;left:0;right:0;height:36px;color:#9ca3af;font:12px/36px system-ui,sans-serif;padding:0 8px}</style></head><body><div class="overlay" id="ov">Chargement…</div><img id="slide" alt="slide"/><script>var items=[];var idx=0;var timer=null;async function loadPlaylist(){var url="latest.json?t="+Date.now();try{var data=await fetch(url,{cache:"no-store"}).then(function(r){return r.json()});items=data.items||[];document.getElementById("ov").textContent=items.length?("Items: "+items.length):"Aucun contenu";}catch(e){document.getElementById("ov").textContent="Erreur de chargement playlist";}}function showNext(){if(!items.length){document.getElementById("slide").src="";timer=setTimeout(showNext,5000);return;}var it=items[idx%items.length];document.title=it.name?it.name+" – Carrousel KPIs":"Carrousel KPIs";var img=document.getElementById("slide");img.src=it.file+"?t="+Date.now();idx++;var dur=Math.max(5,Number(it.durationSec||15))*1000;clearTimeout(timer);timer=setTimeout(showNext,dur);} (async function(){await loadPlaylist();showNext();setInterval(loadPlaylist,60000);})();</script></body></html>
