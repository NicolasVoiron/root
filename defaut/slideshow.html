<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Affichage — defaut</title>
  <style>
    html,body{margin:0;height:100%;background:#000;color:#fff;font-family:system-ui,Segoe UI,Roboto,Arial,sans-serif}
    #wrap{position:relative;height:100%;display:flex;align-items:center;justify-content:center}
    img{max-width:100vw;max-height:100vh;object-fit:contain}
    #badge{position:absolute;left:12px;bottom:12px;background:rgba(0,0,0,.55);padding:8px 10px;border-radius:8px;font-size:14px}
  </style>
</head>
<body>
  <div id="wrap">
    <img id="img" alt="slide" src="" />
    <div id="badge"></div>
  </div>
  <script>
    const slides = [{"name":"lpa1","img":"lpa1_latest.jpg","duration":30}];
    let i = 0;
    const img = document.getElementById('img');
    const badge = document.getElementById('badge');
    function show() {
      if (!slides.length) {
        badge.textContent = 'Aucun écran configuré';
        img.removeAttribute('src');
        return;
      }
      const s = slides[i % slides.length];
      img.src = s.img + '?v=' + Date.now();
      badge.textContent = s.name + ' — ' + new Date().toLocaleString();
      i++;
      setTimeout(show, Math.max(1000, (s.duration||10) * 1000));
    }
    show();
  </script>
</body>
</html>
